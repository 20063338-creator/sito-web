<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi — MusicHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-box">
      <a class="brand" href="index.html">🎵 MusicHub</a>
      <input type="checkbox" id="menu-toggle">
      <label for="menu-toggle" class="hamburger">☰</label>
      <div class="nav-menu">
        <ul class="nav-links">
          <li><a href="strumenti.html">Strumenti</a></li>
          <li><a href="corsi.html">Lezioni</a></li>
        </ul>
        <div class="nav-azioni">
          <button id="tema">🌙</button>
          <a href="login.html">Accedi</a>
          <a href="login.html#registrati">Registrati</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-header">
        <h1 class="auth-titolo">Bentornato su <span class="accento">MusicHub</span></h1>
        <p class="auth-subtitle">Accedi al tuo account o crea uno nuovo</p>
      </div>

      <ul class="auth-tabs" id="auth-tabs" role="tablist">
        <li role="presentation">
          <button class="auth-tab" id="tab-login" data-bs-toggle="tab" data-bs-target="#pannello-login" type="button" role="tab">Accedi</button>
        </li>
        <li role="presentation">
          <button class="auth-tab" id="tab-registrati" data-bs-toggle="tab" data-bs-target="#pannello-registrati" type="button" role="tab">Registrati</button>
        </li>
      </ul>

      <div class="tab-content auth-tab-content">

        <!-- Pannello Login -->
        <div class="tab-pane show active" id="pannello-login" role="tabpanel">

          <div class="campo-gruppo">
            <label for="login-email" class="campo-label">Email</label>
            <input type="email" id="login-email" class="campo-input" placeholder="la-tua@email.it" autocomplete="email">
          </div>

          <div class="campo-gruppo">
            <label for="login-password" class="campo-label">Password</label>
            <input type="password" id="login-password" class="campo-input" placeholder="••••••••" autocomplete="current-password">
          </div>

          <div class="auth-riga-check">
            <div class="auth-check-gruppo">
              <input class="auth-check" type="checkbox" id="ricordami">
              <label class="auth-check-label" for="ricordami">Ricordami</label>
            </div>
            <a href="#" class="auth-link-muted">Password dimenticata?</a>
          </div>

          <a href="dashboard.html" class="btn-primary auth-btn-full">Accedi</a>

          <p class="auth-testo-sotto">
            Non hai un account?
            <a href="#" class="auth-link-oro" data-bs-toggle="tab" data-bs-target="#pannello-registrati">Registrati</a>
          </p>
        </div>

        <!-- Pannello Registrazione -->
        <div class="tab-pane" id="pannello-registrati" role="tabpanel">

          <div class="row g-3">
            <div class="col-sm-6">
              <div class="campo-gruppo">
                <label for="reg-nome" class="campo-label">Nome</label>
                <input type="text" id="reg-nome" class="campo-input" placeholder="Mario" autocomplete="given-name">
              </div>
            </div>
            <div class="col-sm-6">
              <div class="campo-gruppo">
                <label for="reg-cognome" class="campo-label">Cognome</label>
                <input type="text" id="reg-cognome" class="campo-input" placeholder="Rossi" autocomplete="family-name">
              </div>
            </div>
          </div>

          <div class="campo-gruppo">
            <label for="reg-email" class="campo-label">Email</label>
            <input type="email" id="reg-email" class="campo-input" placeholder="la-tua@email.it" autocomplete="email">
          </div>

          <div class="campo-gruppo">
            <label for="reg-password" class="campo-label">Password</label>
            <input type="password" id="reg-password" class="campo-input" placeholder="Almeno 8 caratteri" autocomplete="new-password">
          </div>

          <div class="campo-gruppo">
            <label class="campo-label">Tipo di account</label>
            <div class="auth-radio-lista">
              <div class="auth-radio-card">
                <input class="auth-check" type="radio" name="tipo-utente" id="tipo-cliente" checked>
                <label class="auth-radio-label" for="tipo-cliente">
                  <span class="auth-radio-titolo">Cliente</span>
                  <span class="auth-radio-desc">Compro strumenti e prenoto lezioni</span>
                </label>
              </div>
              <div class="auth-radio-card">
                <input class="auth-check" type="radio" name="tipo-utente" id="tipo-insegnante">
                <label class="auth-radio-label" for="tipo-insegnante">
                  <span class="auth-radio-titolo">Insegnante</span>
                  <span class="auth-radio-desc">Offro lezioni di musica</span>
                </label>
              </div>
            </div>
          </div>

          <div class="auth-check-gruppo auth-termini">
            <input class="auth-check" type="checkbox" id="accetto-termini">
            <label class="auth-check-label" for="accetto-termini">
              Accetto i <a href="#" class="auth-link-oro">termini e condizioni</a> di MusicHub
            </label>
          </div>

          <a href="dashboard.html" class="btn-primary auth-btn-full">Crea account</a>

          <p class="auth-testo-sotto">
            Hai già un account?
            <a href="#" class="auth-link-oro" data-bs-toggle="tab" data-bs-target="#pannello-login">Accedi</a>
          </p>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-box">
        <a class="brand" href="index.html">🎵 MusicHub</a>
        <small class="footer-copy">© 2026 — Università</small>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="strumenti.html">Strumenti</a>
          <a href="corsi.html">Lezioni</a>
          <a href="login.html">Accedi</a>
        </nav>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* Tema chiaro/scuro */
    const btn  = document.getElementById('tema');
    const html = document.documentElement;
    if (localStorage.getItem('tema') === 'chiaro') {
      html.setAttribute('data-tema', 'chiaro');
      btn.textContent = '☀️';
    }
    btn.addEventListener('click', () => {
      const t = html.getAttribute('data-tema');
      if (t === 'chiaro') {
        html.removeAttribute('data-tema');
        btn.textContent = '🌙';
        localStorage.setItem('tema', 'scuro');
      } else {
        html.setAttribute('data-tema', 'chiaro');
        btn.textContent = '☀️';
        localStorage.setItem('tema', 'chiaro');
      }
    });

    function apriTabDaHash() {
      if (window.location.hash === '#registrati') {
        bootstrap.Tab.getOrCreateInstance(
          document.getElementById('tab-registrati')
        ).show();
      } else if (window.location.hash === '#accedi') {
        bootstrap.Tab.getOrCreateInstance(
          document.getElementById('tab-login')
        ).show();
      }
    }

    apriTabDaHash();
    window.addEventListener('hashchange', apriTabDaHash);
  </script>
</body>
</html>
